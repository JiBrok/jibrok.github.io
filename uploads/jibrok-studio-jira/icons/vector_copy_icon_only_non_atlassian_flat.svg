<svg xmlns="http://www.w3.org/2000/svg" width="540" height="360" viewBox="230 280 560 380">
  <!-- Flat icon recreation (transparent background, non-Atlassian indigo palette) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cube fills (drawn first) -->
    <path d="M378 390 L512 455 L512 611 L378 536 Z" fill="#6366F1" stroke="none"/>
    <path d="M512 455 L646 390 L646 536 L512 611 Z" fill="#4F46E5" stroke="none"/>
    <path d="M378 390 L512 315 L646 390 L512 455 Z" fill="#F8FAFF" stroke="none"/>

    <!-- optional subtle flat split on the top face -->
    <path d="M541 336 L469 429" stroke="#3730A3" stroke-width="14"/>
    <path d="M512 315 L541 336" stroke="#3730A3" stroke-width="14"/>

    <!-- Cube outline -->
