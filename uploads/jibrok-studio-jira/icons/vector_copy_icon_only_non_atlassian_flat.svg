      <path d="M378 390 L378 536 L512 611 L646 536 L646 390 L512 315 Z"/>
      <path d="M378 390 L512 455 L646 390"/>
      <path d="M512 455 L512 611"/>
    </g>

    <!-- side chevrons -->
    <g stroke="#3730A3" stroke-width="13">
      <path d="M336 407 L262 460 L336 514"/>
      <path d="M688 407 L762 460 L688 514"/>
    </g>

    <!-- terminal glyph -->
    <g stroke="#FFFFFF" stroke-width="6">
      <path d="M413 480 L435 500 L413 512"/>
      <path d="M444 526 L468 541"/>
    </g>
  </g>
</svg>
