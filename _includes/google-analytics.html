{% if site.google_analytics %}
<script>
  // 1. Initialize dataLayer and gtag function (synchronous, before gtag.js loads)
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  // 2. Set default consent to denied (GDPR: no cookies until explicit consent)
  gtag('consent', 'default', {
    'analytics_storage': 'denied',
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied'
  });

  // 3. If user previously granted analytics consent, update immediately
  if (readCookie('cookie_consent_analytics') === 'granted') {
    gtag('consent', 'update', {
      'analytics_storage': 'granted'
    });
  }
</script>

<!-- 4. Load gtag.js asynchronously (after consent defaults are set) -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>

<script>
  // 5. Configure GA4
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}', {
    'anonymize_ip': true,
    'cookie_flags': 'SameSite=Lax;Secure'
  });
</script>
{% endif %}
